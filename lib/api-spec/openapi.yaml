openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Discord bot operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bot-stats:
    get:
      operationId: getBotStats
      tags: [bot]
      summary: Get bot statistics
      description: Returns live Discord bot stats including server count
      responses:
        "200":
          description: Bot statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"
  /bot-commands:
    get:
      operationId: getBotCommands
      tags: [bot]
      summary: Get all bot commands
      description: Returns the live list of slash commands grouped by category
      responses:
        "200":
          description: Command list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BotCommand"
  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [bot]
      summary: Get global XP leaderboard
      description: Returns the top XP earners across all servers
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BotStats:
      type: object
      properties:
        serverCount:
          type: integer
        botName:
          type: string
        botTag:
          type: string
        online:
          type: boolean
        commandCount:
          type: integer
      required:
        - serverCount
        - botName
        - botTag
        - online
        - commandCount
    BotCommand:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        category:
          type: string
      required:
        - name
        - description
        - category
    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        userId:
          type: string
        guildId:
          type: string
        level:
          type: integer
        xp:
          type: integer
      required:
        - rank
        - userId
        - guildId
        - level
        - xp
