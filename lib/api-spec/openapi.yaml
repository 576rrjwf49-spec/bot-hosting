openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bot
    description: Discord bot operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /bot-stats:
    get:
      operationId: getBotStats
      tags: [bot]
      summary: Get bot statistics
      description: Returns live Discord bot stats including server count
      responses:
        "200":
          description: Bot statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStats"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    BotStats:
      type: object
      properties:
        serverCount:
          type: integer
          description: Number of servers the bot is in
        botName:
          type: string
          description: Bot username
        botTag:
          type: string
          description: Bot username with discriminator
        online:
          type: boolean
          description: Whether the bot is online
        commandCount:
          type: integer
          description: Total number of slash commands
      required:
        - serverCount
        - botName
        - botTag
        - online
        - commandCount
