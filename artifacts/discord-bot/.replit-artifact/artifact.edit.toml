kind = "api"
previewPath = "/discord-bot"
title = "Discord Bot"
version = "1.0.0"
id = "discord-bot-artifact"

[[services]]
localPort = 8081
name = "Discord Bot"
paths = ["/discord-bot"]

[services.development]
run = "pnpm --filter @workspace/discord-bot run dev"

[services.production]

[services.production.build]
args = ["echo", "no-build-needed"]

[services.production.run]
args = ["pnpm", "--filter", "@workspace/discord-bot", "run", "start"]

[services.production.run.env]
PORT = "8081"
NODE_ENV = "production"

[services.production.health.startup]
path = "/discord-bot"
